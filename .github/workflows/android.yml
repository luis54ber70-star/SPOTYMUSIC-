name: Generar SPOTYMUSIC APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Pre-configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json

      - name: Generar Proyecto Android y APK
        run: |
          # 1. Crear la firma digital
          keytool -genkey -v -keystore spoty.keystore -alias spoty_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=SpotyMusic, OU=Dev, O=Spoty, L=ES, S=ES, C=ES"
          
          # 2. Inicializar usando el archivo LOCAL (./manifest.json)
          # Esto evita el error de "Unexpected token <"
          yes "" | bubblewrap init --manifest=./manifest.json --metaData.noChromeCheck
          
          # 3. Construir el APK
          yes | bubblewrap build --signingKeyPath=spoty.keystore --signingKeyPassword=123456 --signingKeyAlias=spoty_alias --signingKeyAliasPassword=123456
        continue-on-error: true

      - name: Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SPOTYMUSIC-APK-FINAL
          path: ./*.apk
